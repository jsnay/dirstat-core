language = "C"
include_guard = "DIRSTAT_CORE_H"
autogen_warning = "/* Generated by cbindgen from dirstat-core. Do not edit by hand; run `cbindgen -o include/dirstat_core.h`. */"
documentation = true
documentation_style = "c99"
cpp_compat = true
usize_is_size_t = true

[export]
include = ["DS_ABI_VERSION"]
exclude = ["HIDDEN", "HARDLINK_DUP", "UNREADABLE", "SCANNING", "DUPLICATE", "NON_UTF8", "DEBUG", "INFO", "WARN", "NodeId", "CATEGORY_COUNT"]

[export.rename]


[parse]
parse_deps = false

[defines]
